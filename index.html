<!DOCTYPE html>

<style>
  :root {
    --bg: #fdf6f0; --card-bg: #ffffff; --text: #2c2416; --text-secondary: #6b5e4a;
    --accent: #c75b39; --accent-light: #fce8e0; --border: #e8d5c4;

  }

  .sidebar::-webkit-scrollbar { width: 4px; }

  .sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; background: var(--sidebar-bg); z-index: 2; }

  .sidebar-search input { width: 100%; padding: 9px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: #fff; font-size: 0.85rem; outline: none; }
  .sidebar-search input:focus { border-color: var(--sidebar-active); }
  .sidebar-search input::placeholder { color: rgba(255,255,255,0.3); }
  .sidebar-nav { flex: 1; padding: 8px 0; }
  .sidebar-nav a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--sidebar-text); text-decoration: none; font-size: 0.88rem; border-left: 3px solid transparent; transition: all 0.15s; }
  .sidebar-nav a:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .sidebar-nav a.active { background: rgba(199,91,57,0.15); color: #fff; border-left-color: var(--sidebar-active); font-weight: 600; }
  .sidebar-nav a .num { font-size: 0.72rem; color: rgba(255,255,255,0.35); min-width: 24px; text-align: right; }
  .sidebar-nav a.active .num { color: var(--sidebar-active); }
  .main { margin-left: 280px; flex: 1; padding: 32px 40px 60px; max-width: 1000px; width: 100%; }
  .main-header { text-align: center; margin-bottom: 32px; padding: 28px 0 20px; border-bottom: 2px solid var(--border); }

  .main-header p { color: var(--text-secondary); font-size: 0.92rem; margin-top: 6px; }
  .toolbar { display: flex; gap: 8px; justify-content: center; margin-bottom: 28px; flex-wrap: wrap; }
  .toolbar button { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: #fff; color: var(--text-secondary); cursor: pointer; font-size: 0.84rem; font-family: inherit; transition: all 0.15s; }
  .toolbar button:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .toolbar button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .toolbar button.primary:hover { opacity: 0.9; }
  .essay-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 32px; overflow: hidden; scroll-margin-top: 24px; }
  .essay-card-header { padding: 22px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; cursor: pointer; user-select: none; }
  .essay-card-header .essay-num { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; flex-shrink: 0; }
  .essay-card-header .essay-title-group { flex: 1; }
  .essay-card-header .essay-title-es { font-size: 1.15rem; font-weight: 700; }
  .essay-card-header .essay-title-cn { font-size: 0.84rem; color: var(--text-secondary); margin-top: 2px; }
  .essay-card-header .toggle-icon { font-size: 1.2rem; color: var(--text-secondary); transition: transform 0.25s; }
  .essay-card.collapsed .essay-card-header .toggle-icon { transform: rotate(-90deg); }
  .essay-card.collapsed .essay-card-body { display: none; }
  .sentence-block { padding: 14px 28px; border-bottom: 1px solid #f5efe8; transition: background 0.15s; }
  .sentence-block:hover { background: #fefcf9; }
  .sentence-es { font-size: 1.06rem; font-weight: 500; display: flex; align-items: flex-start; gap: 8px; cursor: pointer; user-select: none; }
  .sentence-es .sentence-num { font-size: 0.7rem; color: #c9b99a; min-width: 22px; padding-top: 3px; flex-shrink: 0; }
  .sentence-es .sentence-toggle { font-size: 0.55rem; color: #c9b99a; padding-top: 5px; flex-shrink: 0; transition: transform 0.2s; }
  .sentence-block.open .sentence-es .sentence-toggle { transform: rotate(90deg); }
  .sentence-es .sentence-text { flex: 1; }
  .sentence-zh { font-size: 0.88rem; color: #8b7355; padding: 2px 0 2px 42px; line-height: 1.5; }
  .play-btn { background: none; border: 1.5px solid var(--border); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--accent); font-size: 0.85rem; flex-shrink: 0; opacity: 0; transition: all 0.15s; margin-top: 1px; }
  .sentence-block:hover .play-btn { opacity: 1; }
  .play-btn:hover { background: var(--accent-light); border-color: var(--accent); }

  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
  .annotation-area { margin-top: 10px; display: none; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .sentence-block.open .annotation-area { display: grid; }
  .annotation-slot { background: var(--annotation-bg); border: 1px solid var(--annotation-border); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 0.8rem; color: #5c4a32; transition: border-color 0.15s, background 0.15s; }
  .annotation-slot:hover { border-color: #d4b896; background: #fffbf6; }
  .annotation-slot .slot-label { font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
  .annotation-slot .slot-label::before { content: ''; display: inline-block; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .annotation-slot.grammar .slot-label { color: #c96a45; } .annotation-slot.grammar .slot-label::before { background: #e8946b; }
  .annotation-slot.pronunciation .slot-label { color: #5a8f72; } .annotation-slot.pronunciation .slot-label::before { background: #7eb8a0; }
  .annotation-slot.morphology .slot-label { color: #5a7499; } .annotation-slot.morphology .slot-label::before { background: #8ea4c8; }
  .annotation-slot .slot-content { line-height: 1.55; min-height: 18px; }
  .annotation-slot .slot-content:empty::after { content: '点击添加笔记...'; color: #c9b99a; font-style: italic; }
  .annotation-slot[contenteditable="true"] { cursor: text; outline: none; }
  .annotation-slot[contenteditable="true"]:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(199,91,57,0.08); }
  .annotation-slot.pre-filled { border-style: solid; border-color: #e8d8c4; background: #fffdf8; }
  .translation-row { padding: 8px 28px; display: flex; align-items: center; gap: 8px; }
  .translation-row button { background: none; border: 1px solid var(--border); border-radius: 16px; padding: 5px 14px; font-size: 0.78rem; color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .translation-row button:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .translation-row button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chinese-translation { margin: 0 28px 14px; padding: 14px 20px; background: #faf7f2; border-radius: var(--radius-sm); font-size: 0.88rem; color: #5c4a32; border-left: 3px solid var(--border); display: none; }
  .chinese-translation.visible { display: block; }
  .knowledge-summary { margin: 18px 28px 22px; background: linear-gradient(135deg,#fef9f4 0%,#fdf4ea 100%); border: 1px solid var(--annotation-border); border-radius: var(--radius); overflow: hidden; }
  .knowledge-summary-header { padding: 13px 20px; font-weight: 700; font-size: 0.92rem; color: var(--accent); display: flex; align-items: center; gap: 8px; }
  .knowledge-summary-body { padding: 0 20px 16px; }
  .ks-section { margin-bottom: 12px; }
  .ks-section h4 { font-size: 0.8rem; font-weight: 700; color: #8b6f4e; margin-bottom: 5px; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.03em; }
  .ks-section h4 .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  .ks-section h4 .dot.phrase { background: #8ea4c8; } .ks-section h4 .dot.culture { background: #c9a87c; }
  .ks-item { display: flex; gap: 8px; padding: 3px 0; font-size: 0.82rem; line-height: 1.5; }

  .ks-item .ks-zh { color: var(--text-secondary); }
  .ks-item .vocab-play-btn { background: none; border: 1px solid var(--annotation-border); border-radius: 50%; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.6rem; color: var(--accent); flex-shrink: 0; margin-right: 4px; vertical-align: middle; transition: all 0.15s; padding: 0; }
  .ks-item .vocab-play-btn:hover { background: var(--accent-light); border-color: var(--accent); }
  .ks-item .vocab-play-btn.playing { background: var(--accent); color: #fff; border-color: var(--accent); animation: pulse 0.8s infinite; }
  .full-text-overview { margin: 0 28px 16px; padding: 18px 22px; background: linear-gradient(135deg,#faf7f2 0%,#f8f2e8 100%); border-radius: var(--radius-sm); border-left: 4px solid var(--accent); position: relative; }
  .full-text-overview .overview-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; justify-content: space-between; }
  .full-text-overview .overview-text { font-size: 1.02rem; line-height: 1.9; color: var(--text); font-weight: 450; }
  .full-text-overview .overview-translation { font-size: 0.88rem; line-height: 1.8; color: var(--text-secondary); margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--annotation-border); }
  .full-text-overview .play-all-btn { background: var(--accent); color: #fff; border: none; border-radius: 16px; padding: 5px 14px; font-size: 0.75rem; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 5px; transition: opacity 0.15s; }
  .full-text-overview .play-all-btn:hover { opacity: 0.85; }
  .full-text-overview .play-all-btn.playing { animation: pulse 0.8s infinite; }
  .back-to-top { position: fixed; bottom: 28px; right: 28px; width: 42px; height: 42px; border-radius: 50%; background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 1.2rem; box-shadow: 0 2px 12px rgba(199,91,57,0.3); opacity: 0; transform: translateY(10px); transition: all 0.25s; pointer-events: none; z-index: 50; display: flex; align-items: center; justify-content: center; }
  .back-to-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .mobile-menu-btn { display: none; position: fixed; top: 12px; left: 12px; z-index: 200; width: 40px; height: 40px; border-radius: 50%; background: var(--sidebar-bg); color: #fff; border: none; font-size: 1.2rem; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; }
  .file-protocol-notice { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 9999; background: #fffbf0; color: #8b6914; padding: 7px 20px; font-size: 0.78rem; text-align: center; border-bottom: 2px solid #f0d78c; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .file-protocol-notice.show { display: block; }
  .file-protocol-notice code { background: #fdf6e3; padding: 1px 6px; border-radius: 3px; font-size: 0.75rem; }
  .file-protocol-notice a { color: var(--accent); }
  @media (max-width: 768px) {
    .sentence-zh { padding-left: 30px; font-size: 0.82rem; }
    .annotation-area { grid-template-columns: 1fr; }
    .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; padding: 20px 16px 40px; }
    .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }
    .sidebar-overlay.open { display: block; }
  }
  @media print {
    .sidebar,.back-to-top,.mobile-menu-btn,.sidebar-overlay,.toolbar { display:none!important; }

    .chinese-translation { display:block!important; }
    .essay-card.collapsed .essay-card-body { display:block!important; }
  }
  html { scroll-behavior: smooth; }
</style>

<script>
var ESSAYS = [{"num": 1, "title_es": "Mi día", "title_cn": "我的一天", "spanish": "Me despierto a las siete de la mañana. Me cepillo los dientes, me ducho y me visto. Desayuno pan y café. Luego, voy a la universidad en autobús. En la tarde, estudio en la biblioteca. Por la noche, ceno con mi familia y veo la televisión antes de acostarme.", "chinese": "我早上七点起床，刷牙、洗澡、穿衣服，早餐吃面包喝咖啡。然后乘公 交车去大学。下午在图书馆学习。晚上和家人一起吃晚餐，睡觉前看电视。", "sentences": ["Me despierto a las siete de la mañana.", "Me cepillo los dientes, me ducho y me visto.", "Desayuno pan y café.", "Luego, voy a la universidad en autobús.", "En la tarde, estudio en la biblioteca.", "Por la noche, ceno con mi familia y veo la televisión antes de acostarme."]}, {"num": 2, "title_es": "El parque", "title_cn": "公园", "spanish": "El parque es un lugar bonito. Hay árboles, flores y un estanque. Las personas caminan, corren o juegan con sus perros. Los niños se divierten en el área de juegos. Me gusta sentarme en un banco y leer un libro mientras escucho los pájaros cantar.", "chinese": "公园是个美丽的地方，有树木、花朵和池塘。人们散步、跑步或和狗狗 玩耍，孩子们在游乐区嬉戏。我喜欢坐在长椅上看书，听鸟儿唱歌。", "sentences": ["El parque es un lugar bonito.", "Hay árboles, flores y un estanque.", "Las personas caminan, corren o juegan con sus perros.", "Los niños se divierten en el área de juegos.", "Me gusta sentarme en un banco y leer un libro mientras escucho los pájaros cantar."]}, {"num": 3, "title_es": "Mi comida favorita", "title_cn": "我最喜欢的食物", "spanish": "Mi comida favorita es la pizza. Me encanta el queso derretido y los ingredientes variados, como pepperoni, pimientos y champiñones. Cuando voy a un restaurante italiano, siempre pido una pizza. Es deliciosa y me hace muy feliz.", "chinese": "我最喜欢的食物是披萨，我喜欢融化的奶酪和各种配料，比如意大利辣 香肠、甜椒和蘑菇。去意大利餐厅时，我总会点一份披萨，它很美味，让我很 开心。", "sentences": ["Mi comida favorita es la pizza.", "Me encanta el queso derretido y los ingredientes variados, como pepperoni, pimientos y champiñones.", "Cuando voy a un restaurante italiano, siempre pido una pizza.", "Es deliciosa y me hace muy feliz."]}, {"num": 4, "title_es": "Mi mejor amigo", "title_cn": "我最好的朋友", "spanish": "Mi mejor amigo se llama Juan. Es muy simpático y divertido. Nos gusta jugar al fútbol y ver películas juntos. Él siempre me ayuda cuando tengo problemas. Estoy muy afortunado de tener un amigo como él.", "chinese": "我最好的朋友叫胡安，他非常友善有趣。我们喜欢一起踢足球、看电影， 我遇到困难时他总会帮我。有这样的朋友，我很幸运。", "sentences": ["Mi mejor amigo se llama Juan.", "Es muy simpático y divertido.", "Nos gusta jugar al fútbol y ver películas juntos.", "Él siempre me ayuda cuando tengo problemas.", "Estoy muy afortunado de tener un amigo como él."]}, {"num": 5, "title_es": "El viaje a la playa", "title_cn": "海滩之旅", "spanish": "El verano pasado, fui a la playa con mi familia. El mar era azul y el sol brillaba. Jugué con la arena, nadé en el mar y tomé el sol. Comimos helado y disfrutamos de la vista. Fue un día maravilloso que nunca olvidaré.", "chinese": "去年夏天，我和家人去了海滩。大海湛蓝，阳光明媚。我玩沙子、在海 里游泳、晒太阳，还吃了冰淇淋，欣赏美景。那是我永远难忘的美好一天。", "sentences": ["El verano pasado, fui a la playa con mi familia.", "El mar era azul y el sol brillaba.", "Jugué con la arena, nadé en el mar y tomé el sol.", "Comimos helado y disfrutamos de la vista.", "Fue un día maravilloso que nunca olvidaré."]}, {"num": 6, "title_es": "Mi mascota", "title_cn": "我的宠物", "spanish": "Tengo un gato llamado Mimi. Es muy bonito, con pelo blanco y ojos verdes. Mimi me sigue por toda la casa y me acurruca en mis piernas. Me encanta jugar con él y darle munchis. Es como un miembro más de mi familia.", "chinese": "我有一只猫叫咪咪，它很漂亮，白毛绿眼。咪咪总是跟着我在家里转， 还会蜷缩在我腿上。我喜欢和它玩耍、喂它零食，它就像我家的一员。", "sentences": ["Tengo un gato llamado Mimi.", "Es muy bonito, con pelo blanco y ojos verdes.", "Mimi me sigue por toda la casa y me acurruca en mis piernas.", "Me encanta jugar con él y darle munchis.", "Es como un miembro más de mi familia."]}, {"num": 7, "title_es": "La mañana", "title_cn": "早晨", "spanish": "La mañana es mi momento favorito del día. El aire es fresco y el sol empieza a brillar. Me gusta tomar un café caliente y ver el amanecer. Es un buen comienzo para un día productivo.", "chinese": "早晨是我一天中最喜欢的时刻，空气清新，阳光初现。我喜欢喝一杯热 咖啡，看日出，这是开启高效一天的好方式。", "sentences": ["La mañana es mi momento favorito del día.", "El aire es fresco y el sol empieza a brillar.", "Me gusta tomar un café caliente y ver el amanecer.", "Es un buen comienzo para un día productivo."]}, {"num": 8, "title_es": "Mi casa", "title_cn": "我的家", "spanish": "Vivo en una casa pequeña pero acogedora. Tiene dos habitaciones, una cocina y un salón. En el salón, hay una televisión y un sofá muy cómodo. Me gusta pasar tiempo en mi habitación leyendo o escuchando música.", "chinese": "我住在一个小而温馨的房子里，有两个房间、一个厨房和一个客厅。客 厅里有电视和一张很舒服的沙发，我喜欢在房间里看书或听音乐。", "sentences": ["Vivo en una casa pequeña pero acogedora.", "Tiene dos habitaciones, una cocina y un salón.", "En el salón, hay una televisión y un sofá muy cómodo.", "Me gusta pasar tiempo en mi habitación leyendo o escuchando música."]}, {"num": 9, "title_es": "El idioma español", "title_cn": "西班牙语", "spanish": "Aprender español es muy divertido. Las palabras son bonitas y la gramática es interesante. Me gusta hablar español con mis amigos y ver películas en español. Quiero viajar a España y practicar el idioma.", "chinese": "学习西班牙语很有趣，词汇优美，语法也很有意思。我喜欢和朋友用西 班牙语交流，看西班牙语电影。我想去西班牙旅行，练习这门语言。", "sentences": ["Aprender español es muy divertido.", "Las palabras son bonitas y la gramática es interesante.", "Me gusta hablar español con mis amigos y ver películas en español.", "Quiero viajar a España y practicar el idioma."]}, {"num": 10, "title_es": "El otoño", "title_cn": "秋天", "spanish": "El otoño es una estación preciosa. Los árboles cambian de color, y las hojas marrones caen al suelo. Hace un calorcito y se puede sentir el aroma de las manzanas y las calabazas. Es el mejor momento para tomar té caliente.", "chinese": "秋天是个美丽的季节，树叶变色，棕色的叶子飘落。天气微暖，可以闻 到苹果和南瓜的香气，这是喝热茶的最佳时节。", "sentences": ["El otoño es una estación preciosa.", "Los árboles cambian de color, y las hojas marrones caen al suelo.", "Hace un calorcito y se puede sentir el aroma de las manzanas y las calabazas.", "Es el mejor momento para tomar té caliente."]}, {"num": 11, "title_es": "Mi hobby", "title_cn": "我的爱好", "spanish": "Mi hobby es pintar. Me gusta sentarme en mi estudio y crear dibujos con acuarelas o óleos. Pinto paisajes, retratos y objetos cotidianos. Pintar me ayuda a relajarme y expresar mis sentimientos.", "chinese": "我的爱好是画画，我喜欢坐在工作室里，用水彩或油画创作。我画风景、 肖像和日常物品，画画能让我放松，表达情感。", "sentences": ["Mi hobby es pintar.", "Me gusta sentarme en mi estudio y crear dibujos con acuarelas o óleos.", "Pinto paisajes, retratos y objetos cotidianos.", "Pintar me ayuda a relajarme y expresar mis sentimientos."]}, {"num": 12, "title_es": "La fiesta", "title_cn": "派对", "spanish": "Celebré mi cumpleaños con una gran fiesta. Mis amigos vinieron a mi casa con regalos y pastel. Bailamos, comimos y charlamos toda la noche. Fue una fiesta inolvidable y me sentí muy querido.", "chinese": "我举办了一场盛大的生日派对，朋友们带着礼物和蛋糕来我家。我们整 晚跳舞、吃东西、聊天，这是一场难忘的派对，我感到很幸福。", "sentences": ["Celebré mi cumpleaños con una gran fiesta.", "Mis amigos vinieron a mi casa con regalos y pastel.", "Bailamos, comimos y charlamos toda la noche.", "Fue una fiesta inolvidable y me sentí muy querido."]}, {"num": 13, "title_es": "El libro", "title_cn": "书", "spanish": "Me encanta leer libros. En particular, amo las novelas de ciencia ficción y misterio. Un buen libro me transporta a otros mundos y me hace pensar en cosas nuevas. Leo antes de dormir todos los días.", "chinese": "我喜欢读书，尤其热爱科幻和悬疑小说。一本好书能带我进入新世界， 让我思考新事物，我每天睡前都会看书。", "sentences": ["Me encanta leer libros.", "En particular, amo las novelas de ciencia ficción y misterio.", "Un buen libro me transporta a otros mundos y me hace pensar en cosas nuevas.", "Leo antes de dormir todos los días."]}, {"num": 14, "title_es": "El gimnasio", "title_cn": "健身房", "spanish": "Voy al gimnasio tres veces a la semana. Hago ejercicio en las máquinas, corro en la cinta y hago yoga. Me siento más saludable y energética después de entrenar. Es una forma buena de cuidarme.", "chinese": "我每周去三次健身房，在器械上锻炼、在跑步机上跑步、做瑜伽。锻炼 后我感觉更健康、精力充沛，这是照顾自己的好方式。", "sentences": ["Voy al gimnasio tres veces a la semana.", "Hago ejercicio en las máquinas, corro en la cinta y hago yoga.", "Me siento más saludable y energética después de entrenar.", "Es una forma buena de cuidarme."]}, {"num": 15, "title_es": "Mi ciudad", "title_cn": "我的城市", "spanish": "Vivo en una ciudad muy animada. Hay muchos parques, museos y tiendas. En el centro, hay una plaza grande donde las personas se reúnen. Me gusta pasear por las calles y probar la comida local.", "chinese": "我住在一座热闹的城市，有许多公园、博物馆和商店。市中心有一个大 广场，人们常在那里聚会。我喜欢在街上漫步，品尝当地美食。", "sentences": ["Vivo en una ciudad muy animada.", "Hay muchos parques, museos y tiendas.", "En el centro, hay una plaza grande donde las personas se reúnen.", "Me gusta pasear por las calles y probar la comida local."]}, {"num": 16, "title_es": "El tren", "title_cn": "火车", "spanish": "A veces viajo en tren. Es una forma cómoda y relajante de viajar. Puedo ver los paisajes bonitos desde la ventana y trabajar o leer durante el viaje. Además, es más ecológico que viajar en coche.", "chinese": "我有时乘火车旅行，这是一种舒适放松的出行方式。我可以从车窗欣赏 美景，旅途中还能工作或看书，而且比开车更环保。", "sentences": ["A veces viajo en tren.", "Es una forma cómoda y relajante de viajar.", "Puedo ver los paisajes bonitos desde la ventana y trabajar o leer durante el viaje.", "Además, es más ecológico que viajar en coche."]}, {"num": 17, "title_es": "El cumpleaños de mi abuela", "title_cn": "奶奶的生日", "spanish": "Celebramos el cumpleaños de mi abuela. Preparamos un gran banquete con su comida favorita. Le dimos flores y cartas. Ella estaba muy feliz y nos contó historias de cuando era joven. Fue un día lleno de amor.", "chinese": "我们庆祝奶奶的生日，准备了一桌她爱吃的大餐，送给她鲜花和贺卡。 她很开心，还给我们讲年轻时的故事，这是充满爱的一天。", "sentences": ["Celebramos el cumpleaños de mi abuela.", "Preparamos un gran banquete con su comida favorita.", "Le dimos flores y cartas.", "Ella estaba muy feliz y nos contó historias de cuando era joven.", "Fue un día lleno de amor."]}, {"num": 18, "title_es": "El día de campo", "title_cn": "郊游日", "spanish": "El fin de semana fuimos al campo con amigos. Picamos en un prado, jugamos a voleibol y exploramos los bosques. Era tranquilo y hermoso. Nos divertimos mucho y nos relajamos al aire libre.", "chinese": "周末我们和朋友去郊游，在草地上野餐、打排球、探索森林。那里宁静 又美丽，我们玩得很开心，在户外放松身心。", "sentences": ["El fin de semana fuimos al campo con amigos.", "Picamos en un prado, jugamos a voleibol y exploramos los bosques.", "Era tranquilo y hermoso.", "Nos divertimos mucho y nos relajamos al aire libre."]}, {"num": 19, "title_es": "Mi ropa favorita", "title_cn": "我最喜欢的衣服", "spanish": "Mi ropa favorita es un suéter azul. Es muy suave y cómodo. Lo llevo en invierno con jeans y botas. Siempre me siento bien cuando me pongo este suéter.", "chinese": "我最喜欢的衣服是一件蓝色毛衣，它柔软舒适。冬天我搭配牛仔裤和靴 子穿，穿上这件毛衣我总是感觉很好。", "sentences": ["Mi ropa favorita es un suéter azul.", "Es muy suave y cómodo.", "Lo llevo en invierno con jeans y botas.", "Siempre me siento bien cuando me pongo este suéter."]}, {"num": 20, "title_es": "El perro de mi vecino", "title_cn": "邻居的狗", "spanish": "Mi vecino tiene un perro llamado Max. Es muy amistoso y me saluda con moviendo la cola cuando veo. A veces juego con él en la calle. Max es el mejor vecino que puedo tener.", "chinese": "我邻居有一只狗叫马克斯，它非常友好，看到我就摇着尾巴打招呼，有 时我在街上和它一起玩，马克斯是我最好的 “邻居”。", "sentences": ["Mi vecino tiene un perro llamado Max.", "Es muy amistoso y me saluda con moviendo la cola cuando veo.", "A veces juego con él en la calle.", "Max es el mejor vecino que puedo tener."]}, {"num": 21, "title_es": "La película", "title_cn": "电影", "spanish": "Ayer vi una película de terror en el cine. Era muy emocionante y me dio miedo. Pero también era muy entretenida. Me gusta ver películas con mis amigos y discutirla después.", "chinese": "昨天我在电影院看了一部恐怖片，非常刺激，让我害怕，但也很有趣。 我喜欢和朋友一起看电影，之后讨论剧情。", "sentences": ["Ayer vi una película de terror en el cine.", "Era muy emocionante y me dio miedo.", "Pero también era muy entretenida.", "Me gusta ver películas con mis amigos y discutirla después."]}, {"num": 22, "title_es": "El desayuno", "title_cn": "早餐", "spanish": "Un buen desayuno es importante para comenzar el día. Yo siempre como fruta, pan tostado y bebo leche caliente. Me da energía para trabajar y estudiar.", "chinese": "一顿好的早餐对开启一天很重要，我总是吃水果、烤面包，喝热牛奶， 它给我工作和学习的能量。", "sentences": ["Un buen desayuno es importante para comenzar el día.", "Yo siempre como fruta, pan tostado y bebo leche caliente.", "Me da energía para trabajar y estudiar."]}, {"num": 23, "title_es": "El trabajo", "title_cn": "工作", "spanish": "Trabajo en una tienda de libros. Me encanta porque puedo leer los libros nuevos y recomendarles a los clientes. Es un trabajo relajante y me gusta ayudar a otras personas a encontrar libros interesantes.", "chinese": "我在一家书店工作，我很喜欢这份工作，因为可以阅读新书并推荐给顾 客。这是一份轻松的工作，我喜欢帮助别人找到有趣的书。", "sentences": ["Trabajo en una tienda de libros.", "Me encanta porque puedo leer los libros nuevos y recomendarles a los clientes.", "Es un trabajo relajante y me gusta ayudar a otras personas a encontrar libros interesantes."]}, {"num": 24, "title_es": "El invierno", "title_cn": "冬天", "spanish": "En invierno, hace frío y a veces nieve. Me gusta ponerme ropa cálida, beber chocolate caliente y ver la nieve caer desde la ventana. Aunque hace frío, es una estación muy bonita.", "chinese": "冬天很冷，有时会下雪。我喜欢穿上暖和的衣服，喝热巧克力，从窗户 看雪花飘落。虽然寒冷，但这是个很美的季节。", "sentences": ["En invierno, hace frío y a veces nieve.", "Me gusta ponerme ropa cálida, beber chocolate caliente y ver la nieve caer desde la ventana.", "Aunque hace frío, es una estación muy bonita."]}, {"num": 25, "title_es": "El cumpleaños de mi amigo", "title_cn": "朋友的生日", "spanish": "Fuimos a la fiesta de cumpleaños de mi amigo. Le dimos un regalo sorpresa y cantamos “feliz cumpleaños”. Comimos pastel y jugamos juegos de mesa. Fue una noche muy divertida.", "chinese": "我们去参加朋友的生日派对，送给他一份惊喜礼物，唱了生日歌。我们 吃蛋糕、玩桌游，这是一个非常有趣的夜晚。", "sentences": ["Fuimos a la fiesta de cumpleaños de mi amigo.", "Le dimos un regalo sorpresa y cantamos “feliz cumpleaños”.", "Comimos pastel y jugamos juegos de mesa.", "Fue una noche muy divertida."]}, {"num": 26, "title_es": "El paseo en bicicleta", "title_cn": "骑自行车兜风", "spanish": "Los domingos, salgo a pasear en bicicleta. Me gusta rodar por los caminos del campo y ver la naturaleza. Es una forma saludable de hacer ejercicio y disfrutar del día.", "chinese": "周日我会骑自行车兜风，喜欢沿着乡间小路骑行，欣赏自然风光。这是 一种健康的锻炼方式，也能享受美好时光。", "sentences": ["Los domingos, salgo a pasear en bicicleta.", "Me gusta rodar por los caminos del campo y ver la naturaleza.", "Es una forma saludable de hacer ejercicio y disfrutar del día."]}, {"num": 27, "title_es": "Mi clase favorita", "title_cn": "我最喜欢的课", "spanish": "Mi clase favorita es la de arte. En clase, aprendemos a dibujar y a pintar. El profesor es muy amable y nos enseña muchos trucos. Me gusta expresarme a través del arte.", "chinese": "我最喜欢的课是美术课，在课上我们学习绘画，老师很和蔼，教给我们 很多技巧。我喜欢通过艺术表达自己。", "sentences": ["Mi clase favorita es la de arte.", "En clase, aprendemos a dibujar y a pintar.", "El profesor es muy amable y nos enseña muchos trucos.", "Me gusta expresarme a través del arte."]}, {"num": 28, "title_es": "El cielo nocturno", "title_cn": "夜空", "spanish": "Por las noches, me gusta mirar el cielo. Hay muchas estrellas y a veces puedo ver la luna llena. Es tan bonito y me hace sentir pequeña en este mundo.", "chinese": "晚上我喜欢仰望天空，有许多星星，有时能看到满月。夜空很美，让我 在这个世界中感到自己的渺小。", "sentences": ["Por las noches, me gusta mirar el cielo.", "Hay muchas estrellas y a veces puedo ver la luna llena.", "Es tan bonito y me hace sentir pequeña en este mundo."]}, {"num": 29, "title_es": "El cumpleaños de mi hermano", "title_cn": "弟弟的生日", "spanish": "Celebramos el cumpleaños de mi hermano pequeño. Compramos un pastel con figuras de superhéroes. Él abrió sus regalos y estaba muy emocionado. Fue un día feliz para toda la familia.", "chinese": "我们庆祝弟弟的生日，买了一个有超级英雄图案的蛋糕。他打开礼物， 非常兴奋，这是全家人开心的一天。", "sentences": ["Celebramos el cumpleaños de mi hermano pequeño.", "Compramos un pastel con figuras de superhéroes.", "Él abrió sus regalos y estaba muy emocionado.", "Fue un día feliz para toda la familia."]}, {"num": 30, "title_es": "El parque de atracciones", "title_cn": "游乐园", "spanish": "El verano pasado, fui al parque de atracciones con mis primos. Subimos a montañas rusa, torres de la muerte y cascos de terror. Teníamos miedo, pero también nos reíamos mucho. Fue un día inolvidable.", "chinese": "去年夏天，我和表兄弟们去了游乐园。我们坐了过山车、跳楼机和恐怖 鬼屋，虽然害怕，但也笑得很开心，这是难忘的一天。", "sentences": ["El verano pasado, fui al parque de atracciones con mis primos.", "Subimos a montañas rusa, torres de la muerte y cascos de terror.", "Teníamos miedo, pero también nos reíamos mucho.", "Fue un día inolvidable."]}, {"num": 31, "title_es": "La Navidad en mi familia", "title_cn": "我家的圣诞节", "spanish": "En Navidad, mi familia se reúne en casa. Decoramos el árbol de Navidad con luces y adornos. Mi abuela cocina un delicioso pollo asado y pastel de nieve. Los niños abren los regalos y cantamos villancicos. Es el momento más feliz del año.", "chinese": "圣诞节时，全家人在家团聚。我们用彩灯和饰品装饰圣诞树，奶奶会烤 美味的火鸡，做雪蛋糕。孩子们拆开礼物，一起唱圣诞颂歌，这是一年中最快 乐的时刻。", "sentences": ["En Navidad, mi familia se reúne en casa.", "Decoramos el árbol de Navidad con luces y adornos.", "Mi abuela cocina un delicioso pollo asado y pastel de nieve.", "Los niños abren los regalos y cantamos villancicos.", "Es el momento más feliz del año."]}, {"num": 32, "title_es": "El día de la primavera", "title_cn": "春日时光", "spanish": "Cuando llega la primavera, los árboles florecen y los pájaros cantan. Me gusta pasear por el jardín, ver las tulipanes rojos y amarillos. También hago piquetes con amigos, disfrutando del sol cálido y la brisa suave.", "chinese": "春天到来时，树木开花，鸟儿欢唱。我喜欢在花园漫步，观赏红色和黄 色的郁金香，也会和朋友野餐，享受温暖的阳光与轻柔的微风。", "sentences": ["Cuando llega la primavera, los árboles florecen y los pájaros cantan.", "Me gusta pasear por el jardín, ver las tulipanes rojos y amarillos.", "También hago piquetes con amigos, disfrutando del sol cálido y la brisa suave."]}, {"num": 33, "title_es": "Mi primer día de trabajo", "title_cn": "我的第一个工作日", "spanish": "El primer día en mi nuevo trabajo fue emocionante y nervioso. Conocí a mis compañeros y mi jefe me mostró cómo funcionaba todo. Aunque estaba un poco ansioso, terminé el día sintiéndome orgulloso de haber aprendido mucho.", "chinese": "新工作的第一天既兴奋又紧张。我认识了同事，老板向我介绍工作流程。 虽然有点焦虑，但下班时我很自豪，因为学到了很多东西。", "sentences": ["El primer día en mi nuevo trabajo fue emocionante y nervioso.", "Conocí a mis compañeros y mi jefe me mostró cómo funcionaba todo.", "Aunque estaba un poco ansioso, terminé el día sintiéndome orgulloso de haber aprendido mucho."]}, {"num": 34, "title_es": "El mercado local", "title_cn": "当地集市", "spanish": "Cada sábado, voy al mercado local. Hay puestos con frutas frescas, pan caliente y flores hermosas. Los vendedores son amables y siempre me ofrecen muestra. Me gusta caminar entre las personas y sentir el ambiente animado.", "chinese": "每周六我都会去当地集市，那里有新鲜水果、热乎的面包和漂亮的鲜花 摊位。摊主们很热情，总会让我试吃。我喜欢在人群中穿梭，感受热闹的氛围。", "sentences": ["Cada sábado, voy al mercado local.", "Hay puestos con frutas frescas, pan caliente y flores hermosas.", "Los vendedores son amables y siempre me ofrecen muestra.", "Me gusta caminar entre las personas y sentir el ambiente animado."]}, {"num": 35, "title_es": "Un día en la montaña", "title_cn": "山中一日", "spanish": "El fin de semana fuimos de excursionismo a la montaña. Subimos por senderos, vimos cascadas y lagos cristalinos. Aunque estaba cansado, la vista era impresionante. Tomamos muchas fotos para recordar ese día mágico.", "chinese": "周末我们去山里徒步，沿着小路攀登，看到了瀑布和清澈的湖泊。虽然 很累，但景色令人惊叹。我们拍了许多照片，纪念这神奇的一天。", "sentences": ["El fin de semana fuimos de excursionismo a la montaña.", "Subimos por senderos, vimos cascadas y lagos cristalinos.", "Aunque estaba cansado, la vista era impresionante.", "Tomamos muchas fotos para recordar ese día mágico."]}, {"num": 36, "title_es": "Mi biblioteca favorita", "title_cn": "我最喜欢的图书馆", "spanish": "La biblioteca de mi ciudad es mi lugar favorito. Hay miles de libros, mesas tranquilas y una sección de juegos para niños. Puedo pasar horas leyendo o estudiando aquí. La paz y la iluminación natural me ayudan a concentrarme.", "chinese": "市图书馆是我最喜欢的地方，那里有上万册书籍、安静的书桌和儿童游 戏区。我可以在这里花几个小时阅读或学习，宁静的氛围和自然光线有助于我 集中注意力。", "sentences": ["La biblioteca de mi ciudad es mi lugar favorito.", "Hay miles de libros, mesas tranquilas y una sección de juegos para niños.", "Puedo pasar horas leyendo o estudiando aquí.", "La paz y la iluminación natural me ayudan a concentrarme."]}, {"num": 37, "title_es": "La fiesta de graduación", "title_cn": "毕业典礼", "spanish": "La fiesta de graduación fue inolvidable. Me puse el toga y el mortarboard, y recibí mi diploma. Mis padres estaban muy orgullosos. Después, tuvimos una fiesta con amigos, bailando y celebrando nuestro futuro.", "chinese": "毕业典礼令人难忘。我穿上学位服、戴上学士帽，接过毕业证书，父母 感到非常骄傲。之后，我们和朋友举办派对，跳舞庆祝未来。", "sentences": ["La fiesta de graduación fue inolvidable.", "Me puse el toga y el mortarboard, y recibí mi diploma.", "Mis padres estaban muy orgullosos.", "Después, tuvimos una fiesta con amigos, bailando y celebrando nuestro futuro."]}, {"num": 38, "title_es": "El día de los muertos", "title_cn": "亡灵节", "spanish": "En México, el día de los muertos es una celebración especial. Decoramos altares con flores de cempasúchil, pan de muerto y fotos de nuestros seres queridos fallecidos. Creamos ofrendas para honrarles y recordar sus vidas.", "chinese": "在墨西哥，亡灵节是个特别的节日。我们用万寿菊、亡灵面包和已故亲 人的照片装饰祭坛，准备祭品缅怀他们，纪念他们的一生。", "sentences": ["En México, el día de los muertos es una celebración especial.", "Decoramos altares con flores de cempasúchil, pan de muerto y fotos de nuestros seres queridos fallecidos.", "Creamos ofrendas para honrarles y recordar sus vidas."]}, {"num": 39, "title_es": "Mi primer viaje solo", "title_cn": "我的第一次独自旅行", "spanish": "Este verano, hice mi primer viaje solo a Barcelona. Visité la Sagrada Familia, caminé por la Rambla y probé la paella. Aunque estaba un poco nervioso al principio, aprendí a confiar en mí mismo y me divertí muchísimo.", "chinese": "今年夏天，我第一次独自去巴塞罗那旅行。我参观了圣家堂，漫步兰布 拉大道，品尝了海鲜饭。虽然一开始有点紧张，但我学会了相信自己，玩得非 常开心。", "sentences": ["Este verano, hice mi primer viaje solo a Barcelona.", "Visité la Sagrada Familia, caminé por la Rambla y probé la paella.", "Aunque estaba un poco nervioso al principio, aprendí a confiar en mí mismo y me divertí muchísimo."]}, {"num": 40, "title_es": "El día de la música", "title_cn": "音乐日", "spanish": "Cada año, en el día de la música, la ciudad se llena de conciertos en las calles. Los músicos locales tocan jazz, rock y música tradicional. La gente baila y canta juntos. Es un día lleno de alegría y sonidos hermosos.", "chinese": "每年的音乐日，城市的街道上都会举办音乐会。当地音乐家演奏爵士、 摇滚和传统音乐，人们一起唱歌跳舞，这是充满欢乐与美妙旋律的一天。", "sentences": ["Cada año, en el día de la música, la ciudad se llena de conciertos en las calles.", "Los músicos locales tocan jazz, rock y música tradicional.", "La gente baila y canta juntos.", "Es un día lleno de alegría y sonidos hermosos."]}];

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function buildSidebar() {
  var h = '';
  for (var i = 0; i < ESSAYS.length; i++) {
    var e = ESSAYS[i];
    h += '<a href="#essay-' + e.num + '" data-num="' + e.num + '" data-title="' + esc(e.title_es + ' ' + e.title_cn) + '"><span class="num">' + e.num + '</span> ' + esc(e.title_es) + '</a>';
  }
  document.getElementById('sidebarNav').innerHTML = h;
}

function buildKnowledge(k) {
  if (!k) return '';
  var s = '';
  if (k.vocabulary && k.vocabulary.length) {
    s += '<div class="ks-section"><h4><span class="dot vocab"></span> 核心词汇 / Vocabulario</h4>';
    for (var i = 0; i < k.vocabulary.length; i++) {
      var wt = k.vocabulary[i].es.replace(/\\(.*?\\)/g, '').trim();
      s += '<div class="ks-item"><button class="vocab-play-btn" data-word="' + esc(wt) + '" onclick="event.stopPropagation();speakVocab(this)" title="朗读">🔊</button><span class="ks-es">' + esc(k.vocabulary[i].es) + '</span><span class="ks-zh">' + esc(k.vocabulary[i].zh) + '</span></div>';
    }
    s += '</div>';
  }
  if (k.grammar && k.grammar.length) {
    s += '<div class="ks-section"><h4><span class="dot grammar"></span> 语法要点 / Gramática</h4>';
    for (var i = 0; i < k.grammar.length; i++) {
      s += '<div class="ks-item"><span class="ks-es">' + esc(k.grammar[i].es) + '</span><span class="ks-zh">' + esc(k.grammar[i].zh) + '</span></div>';
    }
    s += '</div>';
  }
  if (k.phrases && k.phrases.length) {
    s += '<div class="ks-section"><h4><span class="dot phrase"></span> 常用表达 / Expresiones</h4>';
    for (var i = 0; i < k.phrases.length; i++) {
      var pt = k.phrases[i].es.replace(/\\(.*?\\)/g, '').trim();
      s += '<div class="ks-item"><button class="vocab-play-btn" data-word="' + esc(pt) + '" onclick="event.stopPropagation();speakVocab(this)" title="朗读">🔊</button><span class="ks-es">' + esc(k.phrases[i].es) + '</span><span class="ks-zh">' + esc(k.phrases[i].zh) + '</span></div>';
    }
    s += '</div>';
  }
  if (k.culture) {
    s += '<div class="ks-section"><h4><span class="dot culture"></span> 文化知识 / Nota cultural</h4><div class="ks-item"><span class="ks-zh">' + esc(k.culture) + '</span></div></div>';
  }
  return '<div class="knowledge-summary"><div class="knowledge-summary-header">💡 知识点总结 / Resumen</div><div class="knowledge-summary-body">' + s + '</div></div>';
}

function buildCard(e) {
  var k = KNOWLEDGE[e.num] || null;
  var sentAnn = ANNOTATIONS[e.num] || {};
  var sents = '';
  for (var i = 0; i < e.sentences.length; i++) {
    var a = sentAnn[i] || {};
    var g = a.grammar || '';
    var m = a.morphology || '';
    var gClass = g ? ' pre-filled' : '';
    var mClass = m ? ' pre-filled' : '';
    var sid = 's-' + e.num + '-' + i;
    sents += '<div class="sentence-block">' +
      '<div class="sentence-es" onclick="event.stopPropagation();this.parentElement.classList.toggle(\'open\')">' +
        '<span class="sentence-num">' + (i+1) + '.</span>' +
        '<span class="sentence-toggle">▶</span>' +
        '<span class="sentence-text">' + esc(e.sentences[i]) + '</span>' +
        '<button class="play-btn" data-sid="' + sid + '" onclick="event.stopPropagation();speakSentence(this)" title="朗读">🔊</button>' +
      '</div>' +
      '<div class="sentence-zh">' + esc((SENTENCES_ZH[e.num] || [])[i] || '') + '</div>' +
      '<div class="annotation-area">' +
        '<div class="annotation-slot grammar' + gClass + '" contenteditable="true" data-sid="' + sid + '" data-type="grammar" data-original="' + esc(g) + '">' +
          '<div class="slot-label">📝 语法 / Gramática</div><div class="slot-content">' + esc(g) + '</div>' +
        '</div>' +
        '<div class="annotation-slot pronunciation" contenteditable="true" data-sid="' + sid + '" data-type="pronunciation" data-original="">' +
          '<div class="slot-label">🔊 发音 / Pronunciación</div><div class="slot-content"></div>' +
        '</div>' +
        '<div class="annotation-slot morphology' + mClass + '" contenteditable="true" data-sid="' + sid + '" data-type="morphology" data-original="' + esc(m) + '">' +
          '<div class="slot-label">🔒 词性/变位 / Morfología</div><div class="slot-content">' + esc(m) + '</div>' +
        '</div>' +
      '</div></div>';
  }
  var fullTextId = 'fulltext-' + e.num;
  var fullTextHTML = '<div class="full-text-overview">' +
    '<div class="overview-label">' +
      '<span>📄 全文概览 / Texto completo</span>' +
      '<button class="play-all-btn" data-fulltext-id="' + fullTextId + '" onclick="event.stopPropagation();speakFullText(this)" title="朗读全文">🔊 朗读全文</button>' +
    '</div>' +
    '<div class="overview-text" id="' + fullTextId + '">' + esc(e.spanish) + '</div>' +
    '<div class="overview-translation">' + esc(e.chinese) + '</div>' +
    '</div>';
  return '<article class="essay-card" id="essay-' + e.num + '">' +
    '<div class="essay-card-header" onclick="toggleEssay(this.parentElement)">' +
      '<div class="essay-num">' + e.num + '</div>' +
      '<div class="essay-title-group"><div class="essay-title-es">' + esc(e.title_es) + '</div><div class="essay-title-cn">' + esc(e.title_cn) + '</div></div>' +
      '<span class="toggle-icon">▼</span>' +
    '</div>' +
    '<div class="essay-card-body">' + fullTextHTML + sents +
      '<div class="translation-row"><button data-essay-id="essay-' + e.num + '" onclick="event.stopPropagation();toggleTranslation(this)">🌍 显示中文翻译</button></div>' +
      '<div class="chinese-translation" id="translation-essay-' + e.num + '">' + esc(e.chinese) + '</div>' +
      buildKnowledge(k) +
    '</div></article>';
}

// ===== SPEECH SYNTHESIS =====
var TTS_ENGINE = 'google';
var TTS_SPEED = 0.70;
var currentAudio = null;
var currentUtterance = null;
var currentBtn = null;
var _speaking = false;

function toggleTTSEngine() {
  var btn = document.getElementById('ttsEngineBtn');
  if (TTS_ENGINE === 'google') {
    TTS_ENGINE = 'web';
    btn.textContent = '💻 系统语音';
    btn.title = '切换语音引擎 (当前: 系统Web Speech API)';
  } else {
    TTS_ENGINE = 'google';
    btn.textContent = '🎙️ Google TTS';
    btn.title = '切换语音引擎 (当前: Google TTS - 更自然流畅)';
  }
  try {
    localStorage.setItem('spanish_tts_engine', TTS_ENGINE);
    localStorage.setItem('spanish_tts_saved_from', window.location.protocol === 'file:' ? 'file' : (window.location.hostname === 'localhost' ? 'localhost' : 'https'));
  } catch(e) {}
}

function changeSpeed(delta) {
  TTS_SPEED = Math.round((TTS_SPEED + delta) * 100) / 100;
  TTS_SPEED = Math.max(0.35, Math.min(1.2, TTS_SPEED));
  document.getElementById('speedLabel').textContent = TTS_SPEED.toFixed(2) + 'x';
  try { localStorage.setItem('spanish_tts_speed', TTS_SPEED); } catch(e) {}
}

function stopAllSpeech() {
  _speaking = false;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (currentUtterance) { window.speechSynthesis.cancel(); currentUtterance = null; }
  if (currentBtn) { currentBtn.classList.remove('playing'); currentBtn = null; }
}

function speakWithGoogleTTS(text, btn, onStart, onEnd) {
  var chunks = [];
  var maxChunk = 180;
  if (text.length <= maxChunk) { chunks = [text]; }
  else {
    var remaining = text;
    while (remaining.length > 0) {
      if (remaining.length <= maxChunk) { chunks.push(remaining); break; }
      var chunk = remaining.substring(0, maxChunk);
      var lastPeriod = Math.max(chunk.lastIndexOf('.'), chunk.lastIndexOf('!'), chunk.lastIndexOf('?'));
      if (lastPeriod > maxChunk * 0.5) { chunk = remaining.substring(0, lastPeriod + 1); remaining = remaining.substring(lastPeriod + 1).trim(); }
      else { var lastSpace = chunk.lastIndexOf(' '); chunk = remaining.substring(0, lastSpace > 0 ? lastSpace : maxChunk); remaining = remaining.substring(lastSpace > 0 ? lastSpace : maxChunk).trim(); }
      chunks.push(chunk);
    }
  }
  var chunkIndex = 0;
  var fellBack = false;
  if (onStart) onStart();
  function playNextChunk() {
    if (chunkIndex >= chunks.length) { if (onEnd) onEnd(); currentAudio = null; return; }
    var url = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=es&client=tw-ob&q=' + encodeURIComponent(chunks[chunkIndex]);
    var audio = document.createElement('audio');
    audio.setAttribute('referrerpolicy', 'no-referrer');
    audio.src = url;
    audio.playbackRate = TTS_SPEED;
    currentAudio = audio;
    audio.onended = function() { chunkIndex++; playNextChunk(); };
    audio.onerror = function() { if (fellBack) return; fellBack = true; speakWithWebAPI(text, btn, onStart, onEnd); };
    audio.play().catch(function() { if (fellBack) return; fellBack = true; speakWithWebAPI(text, btn, onStart, onEnd); });
  }
  playNextChunk();
}

function speakWithWebAPI(text, btn, onStart, onEnd) {
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES';
  u.rate = TTS_SPEED;
  u.pitch = 1.0;
  var voices = window.speechSynthesis.getVoices();
  var bestVoice = null;
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang.indexOf('es') === 0) { if (!bestVoice) bestVoice = voices[i]; if (voices[i].name.indexOf('ónica') > 0 || voices[i].name.indexOf('Paulina') >= 0 || voices[i].name.indexOf('Google') >= 0) { bestVoice = voices[i]; break; } }
  }
  if (bestVoice) u.voice = bestVoice;
  u.onstart = function() { if (onStart) onStart(); };
  u.onend = function() { currentUtterance = null; if (onEnd) onEnd(); };
  u.onerror = function() { currentUtterance = null; if (onEnd) onEnd(); };
  currentUtterance = u;
  window.speechSynthesis.speak(u);
}

function speakSentence(btn) {
  var sid = btn.dataset.sid;
  var text = window._sentenceTexts[sid] || '';
  if (!text) return;
  if (currentBtn === btn && _speaking) { stopAllSpeech(); return; }
  stopAllSpeech();
  _speaking = true;
  currentBtn = btn;
  var onStart = function() { btn.classList.add('playing'); };
  var onEnd = function() { btn.classList.remove('playing'); _speaking = false; currentBtn = null; };
  if (TTS_ENGINE === 'google') { speakWithGoogleTTS(text, btn, onStart, onEnd); }
  else { speakWithWebAPI(text, btn, onStart, onEnd); }
}

function speakFullText(btn) {
  var fullTextId = btn.dataset.fulltextId;
  var text = window._fullTexts[fullTextId] || '';
  if (!text) return;
  if (currentBtn === btn && _speaking) { stopAllSpeech(); return; }
  stopAllSpeech();
  _speaking = true;
  currentBtn = btn;
  var onStart = function() { btn.classList.add('playing'); btn.textContent = '⏸ 暂停'; };
  var onEnd = function() { btn.classList.remove('playing'); btn.textContent = '🔊 朗读全文'; _speaking = false; currentBtn = null; };
  if (TTS_ENGINE === 'google') { speakWithGoogleTTS(text, btn, onStart, onEnd); }
  else { speakWithWebAPI(text, btn, onStart, onEnd); }
}

function speakVocab(btn) {
  var word = btn.dataset.word || '';
  if (!word) return;
  if (currentBtn === btn && _speaking) { stopAllSpeech(); return; }
  stopAllSpeech();
  _speaking = true;
  currentBtn = btn;
  var onStart = function() { btn.classList.add('playing'); };
  var onEnd = function() { btn.classList.remove('playing'); _speaking = false; currentBtn = null; };
  if (TTS_ENGINE === 'google') { speakWithGoogleTTS(word, btn, onStart, onEnd); }
  else { speakWithWebAPI(word, btn, onStart, onEnd); }
}

if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  if (window.speechSynthesis.onvoiceschanged !== undefined) { window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); }; }

  try { var ss = parseFloat(localStorage.getItem('spanish_tts_speed')); if (ss) { TTS_SPEED = ss; document.getElementById('speedLabel').textContent = TTS_SPEED.toFixed(2) + 'x'; } } catch(e) {}
})();

renderAll();
updateBackToTop();
</script>
